<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vibe Interview</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: #f9fafb;
    color: #111827;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .wrapper {
    text-align: center;
    padding: 40px 24px;
    max-width: 480px;
  }
  .logo {
    font-size: 2rem;
    font-weight: 800;
    letter-spacing: -.03em;
    color: #2563eb;
    margin-bottom: 8px;
  }
  .subtitle {
    font-size: .95rem;
    color: #6b7280;
    margin-bottom: 48px;
  }
  .lang-grid {
    display: flex;
    gap: 16px;
    justify-content: center;
  }
  .lang-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 180px;
    height: 140px;
    background: #fff;
    border: 1px solid #e5e7eb;
    border-radius: 8px;
    box-shadow: 0 1px 2px rgba(0,0,0,.05);
    text-decoration: none;
    color: #111827;
    transition: all .15s;
  }
  .lang-card:hover {
    border-color: #2563eb;
    box-shadow: 0 0 0 2px rgba(37,99,235,.15), 0 2px 8px rgba(0,0,0,.08);
    transform: translateY(-2px);
  }
  .lang-icon {
    font-size: 2.5rem;
    margin-bottom: 12px;
  }
  .lang-label {
    font-size: .95rem;
    font-weight: 600;
  }
  .footer {
    margin-top: 60px;
    font-size: .78rem;
    color: #9ca3af;
  }
  .footer a { color: #6b7280; text-decoration: none; }
  .footer a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="wrapper">
  <div class="logo">Vibe Interview</div>
  <p class="subtitle">PhD Intern Vibe Coding Assessment</p>
  <div class="lang-grid">
    <a href="zh.html" class="lang-card">
      <span class="lang-icon">&#127464;&#127475;</span>
      <span class="lang-label">中文版</span>
    </a>
    <a href="en.html" class="lang-card">
      <span class="lang-icon">&#127468;&#127463;</span>
      <span class="lang-label">English</span>
    </a>
  </div>
  <p class="footer"><a href="https://github.com/HaonianJi/vibe-interview">GitHub</a></p>
</div>
</body>
</html>
